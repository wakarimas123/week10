<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>立即報名 | friend with AI</title>
    <style>
        :root {
            --bg:      oklch(97% 0.018 70);
            --surface: oklch(99% 0.008 70);
            --fg:      oklch(22% 0.02 50);
            --muted:   oklch(50% 0.018 50);
            --border:  oklch(90% 0.014 70);
            --accent:  oklch(64% 0.13 28);

            --font-display: 'Tiempos Headline', 'Newsreader', 'Iowan Old Style', Georgia, serif;
            --font-body:    'Söhne', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            --max-width: 600px;
            --container-padding: 2rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: var(--max-width);
            margin: 0 auto;
            padding: 4rem var(--container-padding);
            flex: 1;
        }

        nav {
            padding: 2rem 0;
            text-align: center;
        }

        .logo {
            font-family: var(--font-display);
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--fg);
            text-decoration: none;
        }

        .form-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .form-header h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        .form-header p {
            color: var(--muted);
        }

        form {
            background-color: var(--surface);
            padding: 3rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--fg);
        }

        input, textarea, select {
            width: 100%;
            padding: 0.8rem 1rem;
            border-radius: 12px;
            border: 1px solid var(--border);
            background-color: var(--bg);
            font-family: inherit;
            font-size: 1rem;
            transition: border-color 0.2s, outline 0.2s;
        }

        input:focus, textarea:focus {
            outline: 2px solid var(--accent);
            border-color: transparent;
        }

        .submit-btn {
            width: 100%;
            background-color: var(--accent);
            color: white;
            padding: 1rem;
            border: none;
            border-radius: 100px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, filter 0.2s;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--muted);
            text-decoration: none;
            font-size: 0.9rem;
        }

        .back-link:hover {
            color: var(--fg);
        }

        footer {
            padding: 2rem 0;
            text-align: center;
            color: var(--muted);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">friend with AI</a>
    </nav>

    <div class="container">
        <div class="form-header">
            <h1>預約對練諮詢</h1>
            <p>填寫以下資訊，讓我們開始這場轉型之旅。</p>
        </div>

        <form action="success.html">
            <div class="form-group">
                <label for="name">您的姓名</label>
                <input type="text" id="name" name="name" placeholder="請輸入您的稱呼" required>
            </div>

            <div class="form-group">
                <label for="company">公司名稱</label>
                <input type="text" id="company" name="company" placeholder="您目前服務的企業" required>
            </div>

            <div class="form-group">
                <label for="title">您的職稱</label>
                <input type="text" id="title" name="title" placeholder="例如：執行長、特助、二代接班人" required>
            </div>

            <div class="form-group">
                <label for="email">電子郵件</label>
                <input type="email" id="email" name="email" placeholder="email@company.com" required>
            </div>

            <div class="form-group">
                <label for="painpoint">目前最想解決的轉型痛點</label>
                <textarea id="painpoint" name="painpoint" rows="4" placeholder="例如：舊有的下單系統難以使用、想嘗試 AI 客服原型..."></textarea>
            </div>

            <button type="submit" class="submit-btn">送出報名資訊</button>
        </form>

        <a href="index.html" class="back-link">← 回到首頁</a>
    </div>

    <footer>
        <p>&copy; 2026 friend with AI. All rights reserved.</p>
    </footer>

    <script>
        document.querySelector('form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const submitBtn = form.querySelector('.submit-btn');
            const originalBtnText = submitBtn.textContent;
            
            // Basic UI feedback (changing button state)
            submitBtn.disabled = true;
            submitBtn.textContent = '傳送中...';

            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            try {
                const response = await fetch('/api/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(data),
                });

                if (response.ok) {
                    // Trigger existing success screen
                    window.location.href = form.getAttribute('action');
                } else {
                    const errorData = await response.json();
                    alert('發生錯誤：' + (errorData.error || '請稍後再試'));
                    submitBtn.disabled = false;
                    submitBtn.textContent = originalBtnText;
                }
            } catch (error) {
                console.error('Submission error:', error);
                alert('連線失敗，請檢查網路狀態');
                submitBtn.disabled = false;
                submitBtn.textContent = originalBtnText;
            }
        });
    </script>
</body>
</html>
