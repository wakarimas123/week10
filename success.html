<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>報名成功 | friend with AI</title>
    <style>
        :root {
            --bg:      oklch(97% 0.018 70);
            --surface: oklch(99% 0.008 70);
            --fg:      oklch(22% 0.02 50);
            --muted:   oklch(50% 0.018 50);
            --border:  oklch(90% 0.014 70);
            --accent:  oklch(64% 0.13 28);

            --font-display: 'Tiempos Headline', 'Newsreader', 'Iowan Old Style', Georgia, serif;
            --font-body:    'Söhne', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            
            --max-width: 600px;
            --container-padding: 2rem;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--fg);
            font-family: var(--font-body);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        .success-card {
            background-color: var(--surface);
            padding: 4rem 3rem;
            border-radius: 24px;
            border: 1px solid var(--border);
            max-width: var(--max-width);
            width: 90%;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 2rem;
            color: var(--accent);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }

        p {
            color: var(--muted);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        .back-btn {
            display: inline-block;
            background-color: var(--accent);
            color: white;
            padding: 1rem 2rem;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s, filter 0.2s;
        }

        .back-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>
    <div class="success-card">
        <div class="success-icon">✓</div>
        <h1>報名已送出！</h1>
        <p>感謝您的信任。我將在 48 小時內親自與您聯繫，討論您的企業轉型對練計畫。</p>
        <a href="index.html" class="back-btn">回到首頁</a>
    </div>
</body>
</html>
